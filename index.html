<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MojiFlood</title>

    <!-- Telegram Mini App SDK — грузим ДО загрузчика Unity. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Безопасные отступы Telegram → движок (доли экрана). Складываем системные (статус-бар,
      // плашка навигации Android) и контентные (плавающий ✕/⋮ Telegram) + флаг фуллскрина.
      // Зовётся из событий Telegram и один раз после загрузки движка (когда появился unityGame).
      function pushTgInsets() {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (!tg) return;
          var sa = tg.safeAreaInset || {};
          var ca = tg.contentSafeAreaInset || {};
          var w = window.innerWidth || 1, h = window.innerHeight || 1;
          var top    = ((sa.top    || 0) + (ca.top    || 0)) / h;
          var bottom = ((sa.bottom || 0) + (ca.bottom || 0)) / h;
          var left   = ((sa.left   || 0) + (ca.left   || 0)) / w;
          var right  = ((sa.right  || 0) + (ca.right  || 0)) / w;
          var fs = tg.isFullscreen ? 1 : 0;
          var payload = top.toFixed(4) + ',' + bottom.toFixed(4) + ',' +
                        left.toFixed(4) + ',' + right.toFixed(4) + ',' + fs;
          if (window.unityGame) window.unityGame.SendMessage('[TelegramBridge]', 'OnWebSafeInsets', payload);
        } catch (e) {}
      }

      // Диагностика (ВРЕМЕННАЯ, уберём): постоянная красная полоска вверху с тегом сборки и
      // состоянием Telegram — платформа, версия, поддержка фуллскрина (fsSup), включён ли он (fsOn).
      // Скрин этой полоски однозначно скажет, что происходит. На обычной (не-Telegram) странице — тоже.
      function mfDiag() {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          var el = document.getElementById('mf-diag');
          if (!el) {
            el = document.createElement('div');
            el.id = 'mf-diag';
            el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;' +
              'text-align:center;font:11px/1.4 monospace;color:#fff;background:rgba(190,20,20,0.65);';
            document.body.appendChild(el);
          }
          if (!tg) { el.textContent = 'BUILD-E no-Telegram'; return; }
          var sa = tg.safeAreaInset || {}, ca = tg.contentSafeAreaInset || {};
          var itop = (sa.top || 0) + (ca.top || 0), ibot = (sa.bottom || 0) + (ca.bottom || 0);
          el.textContent = 'BUILD-E ' + (tg.platform || '?') + ' v' + (tg.version || '?') +
            ' fsOn:' + (tg.isFullscreen ? 'Y' : 'N') +
            ' ' + (window.innerWidth || 0) + 'x' + (window.innerHeight || 0) +
            ' in:t' + itop + ' b' + ibot;
        } catch (e) {}
      }

      // Ранний Telegram-init: запускается до старта движка — убирает белый «шов» на загрузке,
      // разворачивает Mini App и (на телефоне) открывает на ВЕСЬ ЭКРАН. Вне Telegram — тихо пропускается.
      (function () {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (!tg) return;
          tg.ready();
          tg.expand();
          if (tg.setHeaderColor)      { try { tg.setHeaderColor('#0E1729'); }     catch (e) {} }
          if (tg.setBackgroundColor)  { try { tg.setBackgroundColor('#0E1729'); } catch (e) {} }
          if (tg.disableVerticalSwipes) { try { tg.disableVerticalSwipes(); }     catch (e) {} } // свайп-вниз не закрывает игру

          // На весь экран (Bot API 8.0+): убирает шапку Telegram сверху и выносит плашку навигации
          // Android из раскладки → поле крупнее, полосы всплывают поверх фона. Гейт по РЕАЛЬНОЙ
          // платформе Telegram (надёжнее, чем pointer:coarse) — не трогаем только ЯВНЫЙ десктоп.
          // Зовём сразу + пара повторов: фуллскрин иногда не схватывается сразу после ready().
          // Отступы прокидываем в движок (pushTgInsets) по событиям + после загрузки.
          var plat = (tg.platform || '').toLowerCase();
          var isDesktop = (plat === 'tdesktop' || plat === 'macos' || plat === 'weba' || plat === 'web');
          var canFs = !isDesktop && tg.isVersionAtLeast && tg.isVersionAtLeast('8.0') && tg.requestFullscreen;
          function goFullscreen() { try { if (canFs && !tg.isFullscreen) tg.requestFullscreen(); } catch (e) {} }
          goFullscreen();
          setTimeout(goFullscreen, 600);
          setTimeout(goFullscreen, 1800);

          if (tg.onEvent) {
            try { tg.onEvent('safeAreaChanged',        pushTgInsets); } catch (e) {}
            try { tg.onEvent('contentSafeAreaChanged', pushTgInsets); } catch (e) {}
            try { tg.onEvent('fullscreenChanged',      pushTgInsets); } catch (e) {}
            try { tg.onEvent('fullscreenFailed',       pushTgInsets); } catch (e) {}
          }
        } catch (e) {}
      })();
    </script>

    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0E1729; overflow: hidden; }
      #unity-canvas { position: fixed; top: 0; left: 0; background: #0E1729; touch-action: none; }
      #unity-loading-bar { position: fixed; left: 0; right: 0; bottom: 18%; margin: auto; width: 60%; max-width: 360px; display: none; }
      #unity-progress-bar-empty { width: 100%; height: 10px; border-radius: 6px; background: #1B2A44; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 100%; border-radius: 6px; background: #61B8F2; transition: width 0.1s linear; }
      #unity-loading-text { text-align: center; color: #61B8F2; font-family: system-ui, -apple-system, sans-serif; font-size: 15px; letter-spacing: 2px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-loading-text">MOJIFLOOD</div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Портретный «телефонный» столбец: на широком окне (десктоп-браузер) НЕ растягиваем
      // интерфейс на всю ширину, а центрируем колонку с фирменными полями по бокам.
      // На телефоне / в Telegram (узкий портрет) окно и так уже → колонка занимает весь экран.
      function fitCanvas() {
        var MAX = 0.62; // на ШИРОКОМ экране (десктоп) держим портретную колонку, чтобы UI не растягивался
        var w = window.innerWidth, h = window.innerHeight;
        // телефон (тач-экран) ВСЕГДА заполняет ширину; колонка-клэмп только на десктопе (мышь) —
        // иначе адресная строка браузера на телефоне делает окно «шире» 1:2 → поля по бокам
        var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
        if (!coarse && w / h > MAX) w = Math.floor(h * MAX);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        canvas.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
      }
      window.addEventListener("resize", fitCanvas);
      fitCanvas();

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL_TG.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL_TG.data.unityweb",
        frameworkUrl: buildUrl + "/WebGL_TG.framework.js.unityweb",
        codeUrl: buildUrl + "/WebGL_TG.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "AnuarMussabayev",
        productName: "MojiFlood",
        productVersion: "1.0",
        // На слабых телефонах раскомментировать для прироста FPS (рендер в нативном, не retina, разрешении):
        // devicePixelRatio: 1,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          window.unityGame = unityInstance;
          fitCanvas();
          document.querySelector("#unity-loading-bar").style.display = "none";

          // Прокинуть актуальные отступы Telegram в движок (фуллскрин/полосы уже могли установиться).
          // Несколько попыток — фуллскрин-переход и отчёт об отступах иногда приходят чуть позже.
          pushTgInsets();
          setTimeout(pushTgInsets, 300);
          setTimeout(pushTgInsets, 1200);
          mfDiag(); setInterval(mfDiag, 1500); // постоянная диагностическая полоска (обновляется)

          // Кнопка «назад» Telegram → в игру (unityInstance доступен только здесь, после загрузки).
          try {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg && tg.BackButton) {
              tg.BackButton.onClick(function () {
                if (window.unityGame) window.unityGame.SendMessage('[TelegramBridge]', 'OnTelegramBack');
              });
              tg.BackButton.show();
            }
          } catch (e) {}
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
